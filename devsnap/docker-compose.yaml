services:
  postgres:
    image: postgres:16-alpine
    container_name: devsnap-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devsnap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devsnap-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devsnap-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devsnap.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - devsnap-network

  # claude mcp add --transport sse postgres http://localhost:9000/sse
  dbmcp:
    image: crystaldba/postgres-mcp
    command: ["--transport", "sse", "--sse-host", "0.0.0.0", "--sse-port", "8000"]
    environment:
      - DATABASE_URI=postgresql://postgres:postgres@postgres:5432/devsnap
    ports:
      - "9000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devsnap-network

  redis:
    image: redis:7-alpine
    container_name: devsnap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devsnap-network

networks:
  devsnap-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_data: